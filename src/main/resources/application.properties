# ============================================
# Application Properties - Colegio Ricardo Palma
# ============================================

spring.application.name=${APP_NAME:colegio-rp-api}
server.port=8080

# --- Database ---
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:colegio_rp}
spring.datasource.username=${DB_USER:colegio_user}
spring.datasource.password=${DB_PASSWORD:colegio_local_2026}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA/Hibernate ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# --- Jackson ---
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.default-property-inclusion=non_null

# --- Actuator ---
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when_authorized

# --- Logging ---
logging.level.root=${LOG_LEVEL:INFO}
logging.level.pe.edu.colegioricardopalma=DEBUG
logging.level.org.springframework.security=INFO

# --- Frontend URL (redirects, Stripe callbacks) ---
app.frontend.url=${APP_FRONTEND_URL:http://localhost:3000}

# --- JWT ---
app.jwt.secret=${JWT_SECRET:dev_secret_colegio_ricardo_palma_2026_local_environment_only}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:15}
app.jwt.refresh-expiration-days=${JWT_REFRESH_EXPIRATION_DAYS:7}

# --- Stripe ---
stripe.secret-key=${STRIPE_SECRET_KEY:sk_test_REPLACE_WITH_VALID_KEY}
stripe.publishable-key=${STRIPE_PUBLISHABLE_KEY:pk_test_REPLACE_WITH_VALID_KEY}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:whsec_xxx}

